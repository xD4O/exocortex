<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exocortex — conversations</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="app-header">
    <div style="display:flex; align-items:center; gap:18px;">
      <div class="brand"><span class="glyph">[*]</span>Exocortex</div>
      <nav>
        <a href="/">dashboard</a>
        <a href="/memory">constellation</a>
        <a href="/tasks">tasks</a>
        <a href="/static/agents.html">agents</a>
        <a href="/chat">chat</a>
        <a href="/static/conversations.html" class="active">conversations</a>
        <a href="/static/profile.html">profile</a>
        <a href="/static/debug.html">debug</a>
        <a href="/reflect">reflect</a>
      </nav>
    </div>
    <div class="header-right">
      <div class="status-strip">
        <span class="kpi"><span class="num" id="kpi-conv-open">0</span>open</span>
        <span class="kpi"><span class="num" id="kpi-conv-total">0</span>total</span>
      </div>
      <button type="button" class="mem-toggle off" id="mem-toggle" aria-label="memory chat toggle" title="Toggle memory chat">
        <span class="label">memory&nbsp;chat</span>
        <span class="switch">
          <span class="on">ON</span>
          <span class="off">OFF</span>
        </span>
      </button>
    </div>
  </header>

  <main class="conv-layout">
    <aside class="conv-sidebar" id="conv-sidebar" aria-label="conversations list">
      <div class="conv-sidebar-head">
        <button type="button" class="conv-new-btn" id="conv-new-btn" title="start a new conversation">+ new</button>
      </div>
      <div class="conv-new-form" id="conv-new-form" hidden>
        <label class="conv-new-label">topic</label>
        <input type="text" id="conv-new-topic" placeholder="what should they discuss?" autocomplete="off" />
        <label class="conv-new-label">participants <span class="hint" id="conv-new-hint">pick 2 or more</span></label>
        <div class="conv-new-participants" id="conv-new-participants"></div>
        <div class="conv-new-warning" id="conv-new-warning" hidden></div>
        <div class="conv-new-actions">
          <button type="button" class="conv-btn-secondary" id="conv-new-cancel">cancel</button>
          <button type="button" class="conv-btn-primary" id="conv-new-create">create</button>
        </div>
      </div>
      <div class="conv-sidebar-groups" id="conv-sidebar-groups"></div>
    </aside>

    <section class="conv-main" id="conv-main">
      <div class="conv-bar" id="conv-bar">
        <div class="conv-bar-left">
          <span class="conv-topic" id="conv-topic">no conversation selected</span>
          <span class="conv-status-pill" id="conv-status-pill" hidden>open</span>
        </div>
        <div class="conv-bar-right">
          <span class="conv-participants" id="conv-participants"></span>
          <button type="button" class="conv-close-btn" id="conv-close-btn" hidden>archive</button>
          <button type="button" class="conv-delete-btn" id="conv-delete-btn" hidden>delete</button>
        </div>
      </div>

      <div class="conv-transcript-wrap">
        <div class="conv-transcript" id="conv-transcript" aria-live="polite"></div>
        <div class="conv-empty" id="conv-empty">
          <div class="conv-empty-inner">
            <div class="conv-empty-glyph">●&nbsp;●</div>
            <div class="conv-empty-msg" id="conv-empty-msg">no conversations yet — click <strong>+ new</strong> to start one</div>
            <button type="button" class="conv-btn-primary conv-empty-cta" id="conv-empty-cta">+ new conversation</button>
          </div>
        </div>
        <button type="button" class="scroll-pill" id="conv-scroll-pill" hidden>↓ <span id="conv-scroll-pill-n">0</span> new</button>
      </div>

      <div class="conv-composer" id="conv-composer" hidden>
        <div class="conv-run-row">
          <label for="conv-run-rounds" class="conv-run-label">rounds:</label>
          <input type="number" id="conv-run-rounds" class="conv-run-rounds" min="1" max="50" step="1" value="1" />
          <button type="button" class="conv-run-btn" id="conv-run-go">run <span class="glyph">▶</span></button>
          <span class="conv-run-status" id="conv-run-status" hidden></span>
        </div>
        <div class="conv-run-warning" id="conv-run-warning" hidden></div>

        <div class="conv-inject-head">
          <span class="rule"></span>
          <span class="label">or inject as operator</span>
          <span class="rule"></span>
        </div>

        <form id="conv-inject-form" autocomplete="off">
          <div class="conv-inject-row">
            <span class="conv-inject-from">from: <strong>operator</strong></span>
            <span class="conv-inject-to-label">to:</span>
            <select id="conv-inject-to" class="conv-inject-select" aria-label="to agent"></select>
          </div>
          <textarea
            id="conv-inject-input"
            placeholder="Type a message to inject as the operator..."
            rows="2"
            spellcheck="false"
            autocomplete="off"></textarea>
          <div class="conv-inject-actions">
            <span class="conv-inject-hint mono">Cmd+⏎ to send</span>
            <button type="submit" class="conv-btn-primary" id="conv-inject-send">send</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/memchat.js"></script>
  <script src="/static/conversations.js"></script>
</body>
</html>
