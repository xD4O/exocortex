<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exocortex — profile</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="app-header">
    <div style="display:flex; align-items:center; gap:18px;">
      <div class="brand"><span class="glyph">[*]</span>Exocortex</div>
      <nav>
        <a href="/">dashboard</a>
        <a href="/memory">constellation</a>
        <a href="/tasks">tasks</a>
        <a href="/static/agents.html">agents</a>
        <a href="/chat">chat</a>
        <a href="/static/conversations.html">conversations</a>
        <a href="/static/profile.html" class="active">profile</a>
        <a href="/static/debug.html">debug</a>
      </nav>
    </div>
    <div class="header-right">
      <button type="button" class="mem-toggle off" id="mem-toggle" aria-label="memory chat toggle" title="Toggle memory chat">
        <span class="label">memory&nbsp;chat</span>
        <span class="switch">
          <span class="on">ON</span>
          <span class="off">OFF</span>
        </span>
      </button>
      <button type="button" class="profile-freeze live" id="profile-freeze" aria-label="profile freeze toggle" title="Toggle profile collection">
        <span class="label">profile</span>
        <span class="switch">
          <span class="dot">●</span>
          <span class="state" id="profile-freeze-state">LIVE</span>
        </span>
      </button>
    </div>
  </header>

  <main class="profile-layout">
    <aside class="profile-questions" id="profile-questions" aria-label="questions for the user">
      <div class="pq-head">
        <span class="title">Questions</span>
        <span class="count"><span id="pq-count">0</span> pending</span>
      </div>
      <div class="pq-list" id="pq-list">
        <div class="pq-empty" id="pq-empty">loading…</div>
      </div>
    </aside>

    <section class="profile-main" id="profile-main" aria-label="profile sections">
      <div class="pm-head">
        <div class="pm-title">
          <span class="kbd">profile of:</span>
          <span class="user-id mono" id="profile-user-id">—</span>
        </div>
        <div class="pm-meta mono" id="profile-meta">loading…</div>
      </div>

      <div class="pm-frozen-banner" id="pm-frozen-banner" hidden>
        profile collection paused — <span class="mono">precog profile freeze off</span> or click the pill to resume
      </div>

      <div class="pm-sections" id="pm-sections">
        <div class="pm-loading mono">loading profile…</div>
      </div>
    </section>
  </main>

  <script src="/static/memchat.js"></script>
  <script src="/static/profile.js"></script>
</body>
</html>
