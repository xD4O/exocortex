<!doctype html>
<html lang="en">
<head>
<script>/* theme boot: set data-theme before first paint (persisted by Settings) */
try{var _t=localStorage.getItem("exo-theme");if(_t&&_t!=="auto")document.documentElement.dataset.theme=_t;}catch(e){}</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exocortex — agents</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="shell-v2">
  <nav class="rail" aria-label="primary">
    <a class="brand" href="/"><svg width="22" height="22" viewBox="0 0 26 26" aria-hidden="true">
          <polygon points="24,13 18.5,22.5 7.5,22.5 2,13 7.5,3.5 18.5,3.5" fill="none" stroke="var(--accent)" stroke-width="1.7" stroke-linejoin="round"/>
          <path d="M13 13 L24 13 M13 13 L7.5 22.5 M13 13 L7.5 3.5" fill="none" stroke="var(--accent-2)" stroke-width="1.4"/>
          <circle cx="24" cy="13" r="2" fill="var(--accent-2)"/><circle cx="7.5" cy="22.5" r="2" fill="var(--accent-2)"/><circle cx="7.5" cy="3.5" r="2" fill="var(--accent-2)"/>
          <circle cx="13" cy="13" r="2.7" fill="var(--accent)"/>
        </svg>
      <span class="brand-name">Exocortex</span>
    </a>
    <div class="rail-group-h">Observe</div>
    <a class="nav-item" href="/"><span class="ico">▣</span><span class="lbl">Dashboard</span></a>
    <a class="nav-item" href="/memory"><span class="ico">✳</span><span class="lbl">Constellation</span></a>
    <a class="nav-item" href="/tasks"><span class="ico">≡</span><span class="lbl">Tasks</span></a>
    <div class="rail-group-h">Agents</div>
    <a class="nav-item active" href="/agents" aria-current="page"><span class="ico">◈</span><span class="lbl">Agents</span></a>
    <a class="nav-item" href="/conversations"><span class="ico">⇄</span><span class="lbl">Conversations</span></a>
    <a class="nav-item" href="/chat"><span class="ico">✎</span><span class="lbl">Chat</span></a>
    <div class="rail-group-h">Mind</div>
    <a class="nav-item" href="/profile"><span class="ico">◐</span><span class="lbl">Profile</span></a>
    <a class="nav-item" href="/reflect"><span class="ico">↻</span><span class="lbl">Reflect</span></a>
    <div class="rail-group-h">System</div>
    <a class="nav-item" href="/settings"><span class="ico">◧</span><span class="lbl">Settings</span></a>
    <a class="nav-item" href="/debug"><span class="ico">⚙</span><span class="lbl">Debug</span></a>
    <div class="rail-foot">
      <div class="stat-box">
        <div class="srow"><span class="k">records</span><span class="v" id="rail-records">—</span></div>
        <div class="srow"><span class="k">events</span><span class="v" id="rail-events">—</span></div>
      </div>
    </div>
  </nav>
  <div class="main-col">
  <header class="app-header">
    <div class="page-title">
      <div class="crumb">operator / agents</div>
      <h1>Agents</h1>
    </div>
    <div class="header-right">
      <div class="status-strip">
        <span class="kpi"><span class="num" id="kpi-agents">-</span>agents</span>
        <span class="kpi"><span class="num" id="kpi-events">-</span>events</span>
      </div>
      <button type="button" class="mem-toggle off" id="mem-toggle" aria-label="memory chat toggle" title="Toggle memory chat">
        <span class="label">memory&nbsp;chat</span>
        <span class="switch">
          <span class="on">ON</span>
          <span class="off">OFF</span>
        </span>
      </button>
    </div>
  </header>

  <main class="agents-layout">
    <aside class="agents-sidebar" id="agents-sidebar" aria-label="agents list"></aside>

    <section class="agents-main" id="agents-main">
      <div class="ag-bar" id="ag-bar">
        <span class="agent-id" id="ag-current">select an agent</span>
        <div class="chips" id="ag-chips" role="tablist">
          <button type="button" class="chip active" data-kind="all">all</button>
          <button type="button" class="chip" data-kind="memory">memory</button>
          <button type="button" class="chip" data-kind="tools">tools</button>
          <button type="button" class="chip" data-kind="dispatch">dispatch</button>
          <button type="button" class="chip" data-kind="chat">chat</button>
        </div>
        <div class="date-range">
          <span>range:</span>
          <select id="ag-range">
            <option value="3600000">1h</option>
            <option value="86400000" selected>24h</option>
            <option value="604800000">7d</option>
            <option value="0">all</option>
          </select>
        </div>
      </div>
      <div class="agents-timeline" id="agents-timeline">
        <div class="ag-empty">select an agent on the left to see its history</div>
      </div>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/memchat.js"></script>
  <script src="/static/agents.js"></script>
  </div><!-- /main-col -->
</body>
</html>
